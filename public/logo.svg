<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- 背景圆 -->
  <circle cx="100" cy="100" r="95" fill="#4A90D9"/>
  <circle cx="100" cy="100" r="88" fill="#5BA0E8"/>
  
  <!-- 身体/围裙 -->
  <ellipse cx="100" cy="155" rx="45" ry="35" fill="#F5A623"/>
  <rect x="65" y="130" width="70" height="30" rx="5" fill="#F5A623"/>
  <!-- 围裙带 -->
  <rect x="75" y="135" width="50" height="5" rx="2" fill="#E8941A"/>
  
  <!-- 头 -->
  <circle cx="100" cy="85" r="40" fill="#FFD93D"/>
  
  <!-- 耳朵 -->
  <ellipse cx="68" cy="58" rx="12" ry="15" fill="#FFD93D"/>
  <ellipse cx="68" cy="58" rx="7" ry="10" fill="#FFB84D"/>
  <ellipse cx="132" cy="58" rx="12" ry="15" fill="#FFD93D"/>
  <ellipse cx="132" cy="58" rx="7" ry="10" fill="#FFB84D"/>
  
  <!-- 眼睛 -->
  <ellipse cx="85" cy="80" rx="8" ry="9" fill="white"/>
  <ellipse cx="115" cy="80" rx="8" ry="9" fill="white"/>
  <circle cx="87" cy="81" r="5" fill="#333"/>
  <circle cx="117" cy="81" r="5" fill="#333"/>
  <!-- 眼睛高光 -->
  <circle cx="89" cy="79" r="2" fill="white"/>
  <circle cx="119" cy="79" r="2" fill="white"/>
  
  <!-- 腮红 -->
  <ellipse cx="70" cy="95" rx="8" ry="5" fill="#FF9999" opacity="0.5"/>
  <ellipse cx="130" cy="95" rx="8" ry="5" fill="#FF9999" opacity="0.5"/>
  
  <!-- 嘴巴 - 微笑 -->
  <path d="M 90 100 Q 100 112 110 100" stroke="#333" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  
  <!-- 胡须 -->
  <line x1="65" y1="92" x2="78" y2="95" stroke="#CC9933" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="65" y1="98" x2="78" y2="98" stroke="#CC9933" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="122" y1="95" x2="135" y2="92" stroke="#CC9933" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="122" y1="98" x2="135" y2="98" stroke="#CC9933" stroke-width="1.5" stroke-linecap="round"/>
  
  <!-- 手 - 拿着账本 -->
  <ellipse cx="55" cy="145" rx="10" ry="12" fill="#FFD93D"/>
  <ellipse cx="145" cy="145" rx="10" ry="12" fill="#FFD93D"/>
  
  <!-- 账本 -->
  <rect x="75" y="140" width="50" height="35" rx="3" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1.5"/>
  <rect x="75" y="140" width="50" height="8" rx="3" fill="#E74C3C"/>
  <!-- 账本线条 -->
  <line x1="82" y1="155" x2="118" y2="155" stroke="#DDD" stroke-width="1.5"/>
  <line x1="82" y1="161" x2="118" y2="161" stroke="#DDD" stroke-width="1.5"/>
  <line x1="82" y1="167" x2="105" y2="167" stroke="#DDD" stroke-width="1.5"/>
  
  <!-- 帽子/头巾 -->
  <ellipse cx="100" cy="52" rx="35" ry="10" fill="#2ECC71"/>
  <path d="M 70 52 Q 75 35 100 30 Q 125 35 130 52" fill="#2ECC71"/>
  <circle cx="100" cy="32" r="5" fill="#F1C40F"/>
</svg>